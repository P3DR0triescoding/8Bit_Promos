<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tech Ofertas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#08090a;
  --surface:#111214;
  --surface2:#18191d;
  --border:#222428;
  --accent:#00e5ff;
  --accent2:#ff3d6b;
  --text:#eef0f4;
  --muted:#6b7280;
  --card-hover:#1c1e23;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* background grid */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:48px 48px;
  opacity:0.35;
  pointer-events:none;
  z-index:0;
}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 20px}

/* ── HEADER ── */
header{
  padding:48px 0 40px;
  text-align:center;
  position:relative;
}

.logo-tag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:20px;
}

.logo-tag::before,.logo-tag::after{
  content:'';
  display:block;
  width:24px;
  height:1px;
  background:var(--accent);
  opacity:0.6;
}

h1{
  font-size:clamp(36px,8vw,72px);
  font-weight:900;
  line-height:1;
  letter-spacing:-0.03em;
  text-transform:uppercase;
}

h1 .hl{
  color:transparent;
  -webkit-text-stroke:1.5px var(--accent);
}

.subtitle{
  margin-top:14px;
  font-size:15px;
  color:var(--muted);
  font-weight:400;
  letter-spacing:0.02em;
}

/* ── FILTROS ── */
.filtros{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:40px;
}

.filtro-btn{
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:7px 18px;
  border:1px solid var(--border);
  border-radius:2px;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all 0.15s;
}

.filtro-btn:hover{border-color:var(--accent);color:var(--accent)}
.filtro-btn.ativo{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
  margin-bottom:64px;
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:border-color 0.2s, background 0.2s, transform 0.2s;
  animation:fadeUp 0.4s ease both;
  text-decoration:none;
  color:inherit;
}

.card:hover{
  border-color:var(--accent);
  background:var(--card-hover);
  transform:translateY(-3px);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.card:nth-child(1){animation-delay:0.05s}
.card:nth-child(2){animation-delay:0.1s}
.card:nth-child(3){animation-delay:0.15s}
.card:nth-child(4){animation-delay:0.2s}
.card:nth-child(5){animation-delay:0.25s}
.card:nth-child(6){animation-delay:0.3s}

.card-img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:contain;
  background:var(--surface2);
  padding:20px;
  border-bottom:1px solid var(--border);
}

.card-body{
  padding:16px;
  display:flex;
  flex-direction:column;
  flex:1;
  gap:10px;
}

.card-loja{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
}

.card-loja.amazon{color:#ff9900}
.card-loja.ml{color:#ffe600}

.card-nome{
  font-size:15px;
  font-weight:600;
  line-height:1.4;
  color:var(--text);
}

.card-preco{
  font-family:'Space Mono',monospace;
  font-size:20px;
  font-weight:700;
  color:var(--accent);
  margin-top:auto;
}

.card-preco .de{
  font-size:12px;
  color:var(--muted);
  text-decoration:line-through;
  font-weight:400;
  margin-right:6px;
}

.card-btn{
  display:block;
  text-align:center;
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:10px;
  border-radius:2px;
  text-decoration:none;
  transition:background 0.15s, color 0.15s;
  margin-top:4px;
}

.card:hover .card-btn{background:var(--accent);color:#000}

.badge{
  display:inline-block;
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:3px 8px;
  border-radius:2px;
  font-weight:700;
}

.badge-oferta{background:#ff3d6b22;color:var(--accent2);border:1px solid #ff3d6b44}
.badge-novo{background:#00e5ff22;color:var(--accent);border:1px solid #00e5ff44}

/* ── EMPTY STATE ── */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  font-family:'Space Mono',monospace;
  font-size:13px;
}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);
  padding:24px 0;
  text-align:center;
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.08em;
}

footer a{color:var(--accent);text-decoration:none}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .grid{grid-template-columns:1fr 1fr}
  .card-preco{font-size:17px}
}
@media(max-width:340px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="logo-tag">Afiliados Tech</div>
    <h1>Tech <span class="hl">Ofertas</span></h1>
    <p class="subtitle">Os melhores produtos de tecnologia com os melhores preços.</p>
  </header>

  <div class="filtros">
    <button class="filtro-btn ativo" onclick="filtrar('todos', this)">Todos</button>
    <button class="filtro-btn" onclick="filtrar('amazon', this)">Amazon</button>
    <button class="filtro-btn" onclick="filtrar('ml', this)">Mercado Livre</button>
    <button class="filtro-btn" onclick="filtrar('oferta', this)">Ofertas</button>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>Tech Ofertas &mdash; Links de afiliado &mdash; <a href="#">Instagram</a></p>
  </footer>

</div>

<script>
// ============================================================
// SEUS PRODUTOS — edite aqui!
// ============================================================
const produtos = [
  {
    nome: "Teclado Mecânico Redragon K552",
    preco: "R$ 249,90",
    precoDe: "R$ 319,90",
    loja: "amazon",
    img: "https://m.media-amazon.com/images/I/71pJaVhFDoL._AC_SL1500_.jpg",
    link: "SEU_LINK_DE_AFILIADO_AQUI",
    badge: "oferta"
  },
  {
    nome: "Mouse Gamer Logitech G203",
    preco: "R$ 189,90",
    precoDe: null,
    loja: "amazon",
    img: "https://m.media-amazon.com/images/I/61MPLgJB1XL._AC_SL1500_.jpg",
    link: "SEU_LINK_DE_AFILIADO_AQUI",
    badge: "novo"
  },
  {
    nome: "Headset HyperX Cloud Stinger",
    preco: "R$ 299,00",
    precoDe: "R$ 399,00",
    loja: "ml",
    img: "https://m.media-amazon.com/images/I/61LDKPmP5dL._AC_SL1500_.jpg",
    link: "SEU_LINK_DE_AFILIADO_AQUI",
    badge: "oferta"
  },
  {
    nome: "SSD Kingston 480GB",
    preco: "R$ 219,90",
    precoDe: null,
    loja: "amazon",
    img: "https://m.media-amazon.com/images/I/71opytPbKGL._AC_SL1500_.jpg",
    link: "SEU_LINK_DE_AFILIADO_AQUI",
    badge: null
  },
  {
    nome: "Webcam Logitech C920",
    preco: "R$ 479,90",
    precoDe: "R$ 599,90",
    loja: "ml",
    img: "https://m.media-amazon.com/images/I/71xGz3rodlL._AC_SL1500_.jpg",
    link: "SEU_LINK_DE_AFILIADO_AQUI",
    badge: "oferta"
  },
  {
    nome: "Controle Xbox Series S/X",
    preco: "R$ 389,90",
    precoDe: null,
    loja: "amazon",
    img: "https://m.media-amazon.com/images/I/61LRnm-RBIL._AC_SL1500_.jpg",
    link: "SEU_LINK_DE_AFILIADO_AQUI",
    badge: "novo"
  }
];
// ============================================================

let filtroAtivo = 'todos';

function renderizar(lista) {
  const grid = document.getElementById('grid');
  if (!lista.length) {
    grid.innerHTML = '<div class="empty">// nenhum produto encontrado</div>';
    return;
  }
  grid.innerHTML = lista.map((p, i) => `
    <a class="card" href="${p.link}" target="_blank" rel="noopener" data-loja="${p.loja}" data-badge="${p.badge || ''}">
      <img class="card-img" src="${p.img}" alt="${p.nome}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22><rect fill=%22%2318191d%22 width=%22200%22 height=%22150%22/><text x=%2250%%22 y=%2250%%22 fill=%22%236b7280%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2213%22>sem imagem</text></svg>'" />
      <div class="card-body">
        <span class="card-loja ${p.loja}">${p.loja === 'amazon' ? 'Amazon' : 'Mercado Livre'}</span>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <span class="card-nome">${p.nome}</span>
          ${p.badge ? `<span class="badge badge-${p.badge}">${p.badge === 'oferta' ? 'Oferta' : 'Novo'}</span>` : ''}
        </div>
        <div class="card-preco">
          ${p.precoDe ? `<span class="de">${p.precoDe}</span>` : ''}
          ${p.preco}
        </div>
        <span class="card-btn">Ver produto →</span>
      </div>
    </a>
  `).join('');
}

function filtrar(tipo, btn) {
  filtroAtivo = tipo;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');

  const filtrado = produtos.filter(p => {
    if (tipo === 'todos') return true;
    if (tipo === 'oferta') return p.badge === 'oferta';
    return p.loja === tipo;
  });
  renderizar(filtrado);
}

renderizar(produtos);
</script>
</body>
</html>
