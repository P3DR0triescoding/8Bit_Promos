<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>8bit Promos</title>
<meta name="color-scheme" content="dark"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
image-rendering:pixelated;

:root{
  --bg:#0a0a0f;
  --surface:#12121a;
  --surface2:#1a1a26;
  --border:#2a2a40;
  --yellow:#ffe600;
  --red:#ff2222;
  --cyan:#00e5ff;
  --green:#00ff88;
  --text:#f0f0ff;
  --muted:#6b6b9a;
}

html{
  scroll-behavior:smooth;
  background:#0a0a0f !important;
  color-scheme:dark;
}

body{
  background:#0a0a0f !important;
  color:#f0f0ff !important;
  font-family:'VT323',monospace;
  min-height:100vh;
  overflow-x:hidden;
}

/* scanline overlay */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events:none;
  z-index:9999;
}

/* pixel grid bg */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
  z-index:0;
}

.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 16px}

/* ── HEADER ── */
header{
  padding:48px 0 40px;
  text-align:center;
}

.logo-img{
  width:220px;
  height:220px;
  object-fit:contain;
  image-rendering:pixelated;
  margin:0 auto 24px;
  display:block;
  filter:drop-shadow(0 0 16px rgba(255,230,0,0.4)) drop-shadow(0 0 32px rgba(255,34,34,0.3));
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.logo-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(28px,6vw,52px);
  line-height:1.4;
  letter-spacing:0.02em;
}

.logo-title .t1{
  display:block;
  color:var(--yellow);
  text-shadow:
    3px 3px 0 #b8a000,
    0 0 20px rgba(255,230,0,0.8),
    0 0 40px rgba(255,230,0,0.4);
}

.logo-title .t2{
  display:block;
  color:var(--red);
  text-shadow:
    3px 3px 0 #990000,
    0 0 20px rgba(255,34,34,0.8),
    0 0 40px rgba(255,34,34,0.4);
}

.subtitle{
  margin-top:16px;
  font-size:26px;
  color:#a0a0cc;
  letter-spacing:0.05em;
}

.blink{animation:blink 1.2s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── FILTROS ── */
.filtros{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:40px;
}

.filtro-btn{
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  padding:10px 18px;
  border:2px solid var(--border);
  background:var(--surface);
  color:#a0a0cc;
  cursor:pointer;
  transition:all 0.1s;
  image-rendering:pixelated;
  clip-path:polygon(0 2px,2px 0,calc(100% - 2px) 0,100% 2px,100% calc(100% - 2px),calc(100% - 2px) 100%,2px 100%,0 calc(100% - 2px));
}

.filtro-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,0.05)}
.filtro-btn.ativo{
  border-color:var(--cyan);
  color:#ffffff;
  background:rgba(0,229,255,0.08);
  text-shadow:
    0 0 6px rgba(0,229,255,1),
    0 0 14px rgba(0,229,255,0.9),
    0 0 28px rgba(0,229,255,0.5);
  box-shadow:
    0 0 10px rgba(0,229,255,0.5),
    0 0 20px rgba(0,229,255,0.2),
    inset 0 0 10px rgba(0,229,255,0.05);
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
  margin-bottom:64px;
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:2px solid var(--border);
  display:flex;
  flex-direction:column;
  transition:all 0.15s;
  animation:fadeUp 0.4s ease both;
  text-decoration:none;
  color:inherit;
  clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px));
  position:relative;
}

.card:hover{
  border-color:var(--cyan);
  background:var(--surface2);
  transform:translateY(-4px);
  box-shadow:0 8px 0 rgba(0,229,255,0.15), 0 0 20px rgba(0,229,255,0.1);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.card:nth-child(1){animation-delay:0.05s}
.card:nth-child(2){animation-delay:0.1s}
.card:nth-child(3){animation-delay:0.15s}
.card:nth-child(4){animation-delay:0.2s}
.card:nth-child(5){animation-delay:0.25s}
.card:nth-child(6){animation-delay:0.3s}

.card-img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:contain;
  background:var(--surface2);
  padding:28px;
  border-bottom:2px solid var(--border);
  image-rendering:pixelated;
}

.card-body{
  padding:14px;
  display:flex;
  flex-direction:column;
  flex:1;
  gap:10px;
}

.card-loja{
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  letter-spacing:0.05em;
}

.card-loja.amazon{
  color:#ffaa22;
  text-shadow:0 0 8px rgba(255,153,0,0.6);
}
.card-loja.ml{
  color:#ffe600;
  text-shadow:0 0 8px rgba(255,230,0,0.6);
}
.card-loja.aliexpress{
  color:#ff4444;
  text-shadow:0 0 8px rgba(255,68,68,0.6);
}

.card-nome{
  font-size:22px;
  line-height:1.3;
  color:#f0f0ff !important;
}

.card-preco{
  font-family:'Press Start 2P',monospace;
  font-size:15px;
  color:#00ff88;
  text-shadow:0 0 10px rgba(0,255,136,0.7);
  margin-top:auto;
}

.card-preco .de{
  font-size:10px;
  color:#8888bb;
  text-decoration:line-through;
  display:block;
  margin-bottom:4px;
  text-shadow:none;
}

.card-btn{
  display:block;
  text-align:center;
  background:transparent;
  border:2px solid var(--cyan);
  color:var(--cyan);
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  padding:12px;
  text-decoration:none;
  transition:all 0.1s;
  clip-path:polygon(0 2px,2px 0,calc(100% - 2px) 0,100% 2px,100% calc(100% - 2px),calc(100% - 2px) 100%,2px 100%,0 calc(100% - 2px));
}

.card:hover .card-btn{
  background:rgba(0,255,136,0.08);
  color:#00ff88;
  border-color:rgba(0,255,136,0.3);
  text-shadow:0 0 10px rgba(0,255,136,0.9), 0 0 20px rgba(0,255,136,0.5);
  box-shadow:none;
}

.card-btn:hover{
  background:rgba(0,255,136,0.08) !important;
  color:#00ff88 !important;
  border-color:rgba(0,255,136,0.3) !important;
  text-shadow:0 0 10px rgba(0,255,136,0.9), 0 0 20px rgba(0,255,136,0.5) !important;
  box-shadow:none !important;
}

.badge{
  position:absolute;
  top:10px;
  right:10px;
  font-family:'Press Start 2P',monospace;
  font-size:9px;
  padding:5px 10px;
}

.badge-oferta{
  background:var(--red);
  color:#fff;
  text-shadow:1px 1px 0 #660000;
  box-shadow:0 0 10px rgba(255,34,34,0.6);
  animation:pulse 1.5s ease-in-out infinite;
}

.badge-novo{
  background:transparent;
  color:#fff;
  border:2px solid var(--cyan);
  text-shadow:0 0 8px rgba(0,229,255,1), 0 0 16px rgba(0,229,255,0.6);
  box-shadow:0 0 10px rgba(0,229,255,0.5), inset 0 0 8px rgba(0,229,255,0.05);
}

@keyframes pulse{
  0%,100%{box-shadow:0 0 10px rgba(255,34,34,0.6)}
  50%{box-shadow:0 0 20px rgba(255,34,34,0.9)}
}

/* ── EMPTY STATE ── */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  line-height:2;
}

/* ── FOOTER ── */
footer{
  border-top:2px solid var(--border);
  padding:24px 0;
  text-align:center;
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  color:#8888bb;
  line-height:2;
}

footer a{
  color:var(--cyan);
  text-decoration:none;
  text-shadow:0 0 8px rgba(0,229,255,0.5);
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .logo-img{width:180px;height:180px}
  .filtro-btn{font-size:10px;padding:9px 14px}
}
@media(max-width:340px){
  .grid{grid-template-columns:1fr}
  .logo-title{font-size:22px}
}
</style>
</head>
<body>

<div class="wrap">

  <header>
    <img class="logo-img" src="8Bit_Promos_icon_definitivo.png" alt="8bit Promos logo" onerror="this.style.display='none'" />
    <div class="logo-title">
      <span class="t1">8BIT</span>
      <span class="t2">PROMOS</span>
    </div>
    <p class="subtitle">&gt; os melhores achados em tech <span class="blink">_</span></p>
  </header>

  <div class="filtros">
    <button class="filtro-btn ativo" onclick="filtrar('todos', this)">[ TODOS ]</button>
    <button class="filtro-btn" onclick="filtrar('amazon', this)">[ AMAZON ]</button>
    <button class="filtro-btn" onclick="filtrar('ml', this)">[ MERCADO LIVRE ]</button>
    <button class="filtro-btn" onclick="filtrar('aliexpress', this)">[ ALIEXPRESS ]</button>
    <button class="filtro-btn" onclick="filtrar('oferta', this)">[ OFERTAS ]</button>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>8BIT PROMOS &mdash; LINKS DE AFILIADO</p>
    <p style="margin-top:8px"><a href="#">INSTAGRAM</a></p>
  </footer>

</div>

<script>
// ============================================================
// SEUS PRODUTOS — edite aqui!
// ============================================================
const produtos = [
  {
    nome: "Teclado Mecânico Redragon Kumara Pro V2",
    preco: "R$ 215,99",
    precoDe: "R$ 309,00",
    loja: "amazon",
    img: "https://m.media-amazon.com/images/I/61nvk16RZrL._AC_SY450_.jpg",
    link: "https://amzn.to/4sIYcM1",
    badge: "oferta"
  },
  {
    nome: "Mouse Gamer Sem Fio Logitech G305",
    preco: "R$ 189,90",
    precoDe: "R$ 299,90",
    loja: "amazon",
    img: "https://m.media-amazon.com/images/I/51sg9BLSMTL._AC_SY450_.jpg",
    link: "https://amzn.to/4vzDtgx",
    badge: "oferta"
  },
  {
    nome: "Headset HyperX Cloud Stinger 2",
    preco: "R$ 464,64",
    precoDe: "R$ 569,00",
    loja: "ml",
    img: "https://http2.mlstatic.com/D_NQ_NP_2X_953409-MLA110508899931_042026-F.webp",
    link: "https://meli.la/157wyD1",
    badge: "oferta"
  },
  {
    nome: "Teclado HyperX Alloy Origins RGB",
    preco: "R$ 509,15",
    precoDe: "R$ 699,00",
    loja: "ml",
    img: "https://http2.mlstatic.com/D_NQ_NP_2X_830988-MLU72564527886_112023-F.webp",
    link: "https://meli.la/31wYAuZ",
    badge: "oferta"
  },
  {
    nome: "Mouse Wireless Pulse Fire Haste 2",
    preco: "R$ 323,00",
    precoDe: "R$ 340,00",
    loja: "ml",
    img: "https://http2.mlstatic.com/D_NQ_NP_2X_789142-MLA99529660400_122025-F.webp",
    link: "https://meli.la/16Mx7GC",
    badge: null
  },
  {
    nome: "Teclado Logitech G213",
    preco: "R$ 441,64",
    precoDe: null,
    loja: "Amazon",
    img: "https://m.media-amazon.com/images/I/71Nqzh-u2rL._AC_SX679_.jpg",
    link: "https://amzn.to/4cPkgzX",
    badge: null
  }
];
// ============================================================

function renderizar(lista) {
  const grid = document.getElementById('grid');
  if (!lista.length) {
    grid.innerHTML = '<div class="empty">// NENHUM PRODUTO ENCONTRADO<br>&gt; TENTE OUTRO FILTRO _</div>';
    return;
  }
  grid.innerHTML = lista.map(p => `
    <a class="card" href="${p.link}" target="_blank" rel="noopener" data-loja="${p.loja}" data-badge="${p.badge || ''}">
      ${p.badge ? `<span class="badge badge-${p.badge}">${p.badge === 'oferta' ? 'OFERTA!' : 'NOVO'}</span>` : ''}
      <img class="card-img" src="${p.img}" alt="${p.nome}" loading="lazy"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22><rect fill=%22%2312121a%22 width=%22200%22 height=%22150%22/><text x=%2250%%22 y=%2250%%22 fill=%22%236b6b9a%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2212%22>SEM IMAGEM</text></svg>'" />
      <div class="card-body">
        <span class="card-loja ${p.loja}">${p.loja === 'amazon' ? '▶ AMAZON' : p.loja === 'ml' ? '▶ MERCADO LIVRE' : '▶ ALIEXPRESS'}</span>
        <span class="card-nome">${p.nome}</span>
        <div class="card-preco">
          ${p.precoDe ? `<span class="de">${p.precoDe}</span>` : ''}
          ${p.preco}
        </div>
        <span class="card-btn">▶ VER PRODUTO</span>
      </div>
    </a>
  `).join('');
}

function filtrar(tipo, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  const filtrado = produtos.filter(p => {
    if (tipo === 'todos') return true;
    if (tipo === 'oferta') return p.badge === 'oferta';
    return p.loja === tipo;
  });
  renderizar(filtrado);
}

renderizar(produtos);
</script>
</body>
</html>
